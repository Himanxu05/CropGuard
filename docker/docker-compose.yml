version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cropguard
      POSTGRES_USER: cropguard
      POSTGRES_PASSWORD: cropguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cropguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - FLASK_CONFIG=production
      - DATABASE_URL=postgresql://cropguard:cropguard@postgres:5432/cropguard
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-cropguard-prod-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-cropguard-jwt-prod-secret}
      - DISEASE_MODEL_PATH=/app/models/disease_detection/best_model.pt
      - YIELD_MODEL_DIR=/app/models/yield_prediction
    volumes:
      - ../models:/app/models:ro
      - uploads:/app/uploads
      - gradcam_outputs:/app/gradcam_outputs
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A celery_worker.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://cropguard:cropguard@postgres:5432/cropguard
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - YIELD_MODEL_DIR=/app/models/yield_prediction
    volumes:
      - ../models:/app/models:ro
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  uploads:
  gradcam_outputs:
